<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="8" fill="#1a5632"/>
  <!-- Pergola roof louvers (3 angled slats) -->
  <line x1="8" y1="11" x2="32" y2="11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="8" y1="15.5" x2="32" y2="15.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="8" y1="20" x2="32" y2="20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Left post -->
  <rect x="10" y="20" width="3.5" height="14" rx="1" fill="white"/>
  <!-- Right post -->
  <rect x="26.5" y="20" width="3.5" height="14" rx="1" fill="white"/>
  <!-- Checkmark/quality badge overlay (small, bottom right) -->
  <circle cx="32" cy="32" r="5.5" fill="#4ecdc4"/>
  <polyline points="29.5,32 31.2,33.8 34.5,30.2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
